services:
  configurator:
    environment:
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
    depends_on:
      - redis-cache
      - redis-queue

  redis-cache:
    image: redis:8.6-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory-policy
      - allkeys-lru
      - --tcp-keepalive
      - "60"
      - --hz
      - "20"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis-queue:
    image: redis:8.6-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "no"
      - --tcp-keepalive
      - "60"
      - --hz
      - "20"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redis-queue-data:/data

volumes:
  redis-queue-data:
